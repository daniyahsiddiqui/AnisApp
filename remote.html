<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Athan Remote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-from: #1e1b4b;
            --bg-to: #0f172a;
            --accent: #eab308;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Outfit', 'Nunito', sans-serif;
            background: linear-gradient(135deg, var(--bg-from), var(--bg-to));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .remote-container {
            width: 100%;
            max-width: 440px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Setup Screen */
        #setup-screen {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .code-input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: border-color 0.2s;
        }

        .code-input:focus {
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: #1e1b4b;
        }

        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .btn-secondary:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.12);
        }

        .status-badge {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            align-self: center;
            margin: 0 auto;
        }

        .status-badge.connected {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        /* Controls Panel */
        #control-panel {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .control-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--glass-border);
            padding-top: 16px;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            font-family: inherit;
        }

        /* Swatches */
        .swatch-group {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .swatch {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        .swatch:active {
            transform: scale(0.9);
        }

        .swatch.active {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="remote-container">
        <div class="header">
            <h1><span>📶</span> Smart Remote</h1>
            <p id="sub-header">Speaker Setup</p>
        </div>

        <!-- Connection Screen -->
        <div id="setup-screen">
            <div class="input-group">
                <label for="peer-id-input">Enter Speaker ID</label>
                <input type="text" id="peer-id-input" class="code-input" placeholder="00000" maxlength="5" pattern="[0-9]*" inputmode="numeric">
            </div>
            <button id="connect-btn" class="btn btn-primary">Connect to Speaker</button>
            <div id="connection-status" class="status-badge">🔴 Disconnected</div>
        </div>

        <!-- Control Panel Screen -->
        <div id="control-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <div id="panel-status" class="status-badge connected">🟢 Connected</div>
                <button id="disconnect-btn" class="btn btn-secondary" style="width: auto; padding: 6px 12px; font-size: 0.8rem; margin: 0;">Disconnect</button>
            </div>

            <!-- Athan Controls -->
            <div class="control-section">
                <div class="section-title">Athan Controls</div>
                <div class="grid-2">
                    <button id="remote-test-btn" class="btn btn-primary">🔊 Test Athan</button>
                    <button id="remote-mute-btn" class="btn btn-secondary">🔇 Toggle Mute</button>
                </div>
            </div>

            <!-- Quran Player -->
            <div class="control-section">
                <div class="section-title">Quran Player</div>
                <select id="remote-surah-select">
                    <option value="">Select Surah...</option>
                </select>
                <div class="grid-2">
                    <button id="remote-quran-play" class="btn btn-primary">▶️ Play</button>
                    <button id="remote-quran-stop" class="btn btn-secondary">⏹️ Stop</button>
                </div>
            </div>

            <!-- Settings Settings -->
            <div class="control-section">
                <div class="section-title">Athan Calculations</div>
                <div style="display:flex; flex-direction: column; gap: 8px;">
                    <select id="remote-method-select">
                        <option value="2">Islamic Society of North America (ISNA)</option>
                        <option value="3">Muslim World League (MWL)</option>
                        <option value="15">Moonsighting Committee Worldwide</option>
                        <option value="1">University of Islamic Sciences, Karachi</option>
                        <option value="4">Umm Al-Qura University, Makkah</option>
                        <option value="5">Egyptian General Authority of Survey</option>
                        <option value="13">Diyanet İşleri Başkanlığı, Turkey</option>
                        <option value="8">Gulf Region</option>
                        <option value="9">Kuwait</option>
                        <option value="11">Majlis Ugama Islam Singapura, Singapore</option>
                    </select>
                    <select id="remote-school-select">
                        <option value="0">Standard (Shafi'i, Maliki, Hanbali)</option>
                        <option value="1">Hanafi</option>
                    </select>
                </div>
            </div>

            <!-- Themes & Actions -->
            <div class="control-section">
                <div class="section-title">Theme / Layout</div>
                <div class="swatch-group">
                    <div class="swatch" data-theme="gold" style="background: #1a1a1a; border: 2px solid #eab308;" title="Midnight Gold"></div>
                    <div class="swatch" data-theme="sand" style="background: #fde68a;" title="Desert Sand"></div>
                    <div class="swatch" data-theme="rose" style="background: #fecdd3;" title="Rose Gold"></div>
                    <div class="swatch" data-theme="joyful" style="background: linear-gradient(135deg, #F9A8D4, #7C3AED);" title="Joyful Kids"></div>
                </div>
            </div>

            <!-- Extra Commands -->
            <div class="control-section" style="border: none;">
                <button id="remote-voice-btn" class="btn btn-secondary">🎙️ Trigger Voice Recognition</button>
            </div>
        </div>
    </div>

    <script src="remote.js"></script>
</body>
</html>
