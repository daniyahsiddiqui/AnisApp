<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Athan Remote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-from: #1e1b4b;
            --bg-to: #0f172a;
            --accent: #eab308;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Outfit', 'Nunito', sans-serif;
            background: linear-gradient(135deg, var(--bg-from), var(--bg-to));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .remote-container {
            width: 100%;
            max-width: 440px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Setup Screen */
        #setup-screen {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .code-input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: border-color 0.2s;
        }

        .code-input:focus {
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: #1e1b4b;
        }

        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .btn-secondary:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.12);
        }

        .status-badge {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            align-self: center;
            margin: 0 auto;
        }

        .status-badge.connected {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        /* Controls Panel */
        #control-panel {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .control-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--glass-border);
            padding-top: 16px;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            font-family: inherit;
        }

        /* Swatches */
        .swatch-group {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .swatch {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        .swatch:active {
            transform: scale(0.9);
        }

        .swatch.active {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        /* Tabs Navigation Styles */
        .tabs-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px 10px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .tab-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.02);
        }
        
        .tab-btn.active {
            background: var(--accent);
            color: #0f172a;
        }
        
        .tab-content {
            display: none;
            flex-direction: column;
            gap: 15px;
        }
        
        .tab-content.active {
            display: flex;
        }
        .speaker-status-bar {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 10px 14px;
            margin-top: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #64748b; /* idle grey */
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .status-dot.listening {
            background-color: #ef4444; /* red */
            box-shadow: 0 0 8px #ef4444;
            animation: pulse 1.5s infinite;
        }
        .status-dot.playing_athan, .status-dot.playing_quran {
            background-color: #3b82f6; /* blue */
            box-shadow: 0 0 8px #3b82f6;
            animation: pulse 2s infinite;
        }
        .status-dot.error {
            background-color: #f59e0b; /* amber */
            box-shadow: 0 0 8px #f59e0b;
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="remote-container">
        <div class="header">
            <h1><span>📶</span> Smart Remote</h1>
            <p id="sub-header">Speaker Setup</p>
        </div>

        <!-- Connection Screen -->
        <div id="setup-screen">
            <div class="input-group">
                <label for="peer-id-input">Enter Speaker ID</label>
                <input type="text" id="peer-id-input" class="code-input" placeholder="00000" maxlength="5" pattern="[0-9]*" inputmode="numeric">
            </div>
            <button id="connect-btn" class="btn btn-primary">Connect to Speaker</button>
            <div id="connection-status" class="status-badge">🔴 Disconnected</div>
        </div>

        <!-- Control Panel Screen -->
        <div id="control-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; width: 100%;">
                <div id="panel-status" class="status-badge connected">🟢 Connected</div>
                <button id="disconnect-btn" class="btn btn-secondary" style="width: auto; padding: 6px 12px; font-size: 0.8rem; margin: 0;">Disconnect</button>
            </div>

            <!-- Tab Navigation -->
            <div class="tabs-nav">
                <button class="tab-btn" data-tab="tab-settings">🎛️ Settings</button>
                <button class="tab-btn active" data-tab="tab-quran">📖 Play Quran</button>
            </div>

            <!-- Speaker Status Bar -->
            <div class="speaker-status-bar">
                <span id="speaker-status-dot" class="status-dot"></span>
                <span id="speaker-status-text">Speaker is Idle</span>
            </div>

            <!-- Tab Content: Controls & Settings -->
            <div id="tab-settings" class="tab-content">
                <!-- Athan Controls -->
                <div class="control-section">
                    <div class="section-title">Athan Controls</div>
                    <div class="grid-2">
                        <button id="remote-test-btn" class="btn btn-primary">🔊 Test Athan</button>
                        <button id="remote-mute-btn" class="btn btn-secondary">🔇 Toggle Mute</button>
                    </div>
                </div>

                <!-- Settings Settings -->
                <div class="control-section">
                    <div class="section-title">Athan Calculations</div>
                    <div style="display:flex; flex-direction: column; gap: 8px;">
                        <select id="remote-method-select">
                            <option value="2">Islamic Society of North America (ISNA)</option>
                            <option value="3">Muslim World League (MWL)</option>
                            <option value="15">Moonsighting Committee Worldwide</option>
                            <option value="1">University of Islamic Sciences, Karachi</option>
                            <option value="4">Umm Al-Qura University, Makkah</option>
                            <option value="5">Egyptian General Authority of Survey</option>
                            <option value="13">Diyanet İşleri Başkanlığı, Turkey</option>
                            <option value="8">Gulf Region</option>
                            <option value="9">Kuwait</option>
                            <option value="11">Majlis Ugama Islam Singapura, Singapore</option>
                        </select>
                        <select id="remote-school-select">
                            <option value="0">Standard (Shafi'i, Maliki, Hanbali)</option>
                            <option value="1">Hanafi</option>
                        </select>
                    </div>
                </div>

                <!-- Themes & Actions -->
                <div class="control-section">
                    <div class="section-title">Theme / Layout</div>
                    <div class="swatch-group">
                        <div class="swatch" data-theme="gold" style="background: #1a1a1a; border: 2px solid #eab308;" title="Midnight Gold"></div>
                        <div class="swatch" data-theme="sand" style="background: #fde68a;" title="Desert Sand"></div>
                        <div class="swatch" data-theme="rose" style="background: #fecdd3;" title="Rose Gold"></div>
                        <div class="swatch" data-theme="joyful" style="background: linear-gradient(135deg, #F9A8D4, #7C3AED);" title="Joyful Kids"></div>
                    </div>
                </div>

                <!-- Extra Commands -->
                <div class="control-section" style="border: none; padding-bottom: 0;">
                    <button class="btn btn-secondary remote-voice-btn" style="background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.25); color: #f87171; width: 100%;">🎙️ Voice Command</button>
                </div>
            </div>

            <!-- Tab Content: Quran Player -->
            <div id="tab-quran" class="tab-content active">
                <!-- Reciter Selector -->
                <div class="control-section">
                    <div class="section-title">Select Reciter</div>
                    <select id="remote-reciter-select">
                        <option value="ar.alafasy">Mishary Rashid Alafasy</option>
                        <option value="ar.abdulbasitmurattal">Abdul Basit Abdul Samad</option>
                        <option value="ar.abdurrahmaansudais">Abdurrahmaan As-Sudais</option>
                    </select>
                </div>

                <!-- Surah Selector -->
                <div class="control-section">
                    <div class="section-title">Select Surah</div>
                    <select id="remote-surah-select">
                        <option value="">Select Surah...</option>
                    </select>
                </div>

                <!-- Ayah Range Selector -->
                <div class="control-section">
                    <div class="section-title">Ayah Range</div>
                    <div class="grid-2">
                        <div>
                            <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 6px;">From Ayah</label>
                            <select id="remote-ayah-from">
                                <option value="1">Ayah 1</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 6px;">To Ayah</label>
                            <select id="remote-ayah-to">
                                <option value="1">Ayah 1</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Repeat Settings -->
                <div class="control-section">
                    <div class="section-title">Repeat Settings</div>
                    <div class="grid-2">
                        <div>
                            <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 6px;">Each Ayah</label>
                            <select id="remote-ayah-repeat">
                                <option value="1">1 time</option>
                                <option value="2">2 times</option>
                                <option value="3">3 times</option>
                                <option value="5">5 times</option>
                                <option value="10">10 times</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 6px;">Whole Range</label>
                            <select id="remote-range-repeat">
                                <option value="1">1 time</option>
                                <option value="2">2 times</option>
                                <option value="3">3 times</option>
                                <option value="5">5 times</option>
                                <option value="10">10 times</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="control-section" style="border: none; padding-bottom: 0;">
                    <div class="grid-2" style="margin-bottom: 10px;">
                        <button id="remote-quran-play" class="btn btn-primary">▶️ Play Quran</button>
                        <button id="remote-quran-stop" class="btn btn-secondary">⏹️ Stop</button>
                    </div>
                    <button id="remote-takbeerat-btn" class="btn" style="background: linear-gradient(135deg, #10b981, #059669); border: none; color: white; width: 100%; margin-bottom: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Outfit', sans-serif;">🕋 Play Takbeerat</button>
                    <button class="btn btn-secondary remote-voice-btn" style="background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.25); color: #f87171; width: 100%;">🎙️ Voice Command</button>
                </div>
            </div>
        </div>
    </div>

    <script src="remote.js?v=2"></script>
</body>
</html>
